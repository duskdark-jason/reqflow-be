# 测试环境连接配置
#
# 使用方式：
# - 启动时指定 `--spring.profiles.active=druid,test`
# - 或设置环境变量 `SPRING_PROFILES_ACTIVE=druid,test`
# - MySQL 与 Redis 的内网连接信息由开发人员提供后直接写入本文件

spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driverClassName: com.mysql.cj.jdbc.Driver
    druid:
      master:
        url: jdbc:mysql://localhost:3306/ry-vue?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8
        username: root
        password: 123456
      slave:
        enabled: false
        url:
        username:
        password:
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      password:
      timeout: 10s
